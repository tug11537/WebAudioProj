<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sound Drift</title>
    <link rel="stylesheet" href="style.css" />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="zone1" class="zoneOverlay"></div>
    <div id="zone2" class="zoneOverlay"></div>
    <div id="zone3" class="zoneOverlay"></div>
    <div id="app">
      <h1>Sound Drift</h1>
      <p id="description">
        An interactive audio-visual space where mouse movement controls sound,
        filter motion, spatialization, and reactive visuals.
      </p>
      <p id="instructions">
        Move the mouse to explore pitch, space and timbre.
      </p>
      <p id="hint">Click Start!</p>
      <button id="hideBtn">Hide Controls</button>
      <div id="zoneLabels">
        <span>Drift</span>
        <span>Bloom</span>
        <span>Air</span>
      </div>
    </div>
    <div id="controls">
      <div class="button-row">
        <button id="startBtn">Start</button>
        <button id="stopBtn" disabled>Stop</button>
      </div>

      <label>
        Master <span id="masterVal">0.40</span>
        <input
          id="master"
          type="range"
          min="0"
          max="0.9"
          step="0.01"
          value="0.40"
        />
      </label>

      <label>
        Cutoff Range <span id="cutoffVal">3000</span> Hz
        <input
          id="cutoffRange"
          type="range"
          min="500"
          max="6000"
          step="10"
          value="3000"
        />
      </label>

      <label>
        Reverb <span id="wetVal">0.30</span>
        <input id="wet" type="range" min="0" max="1" step="0.01" value="0.30" />
      </label>

      <label>
        LFO Rate <span id="lfoVal">0.08</span> Hz
        <input
          id="lfoRate"
          type="range"
          min="0"
          max="2"
          step="0.01"
          value="0.08"
        />
      </label>
    </div>

    <script src="https://unpkg.com/tone@14.8.49/build/Tone.js"></script>
    <script src="https://unpkg.com/three@0.160.0/build/three.min.js"></script>
    <script src="script.js"></script>
  </body>
</html>
