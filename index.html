<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Sound Space</title>
    <style>
      body {
        margin: 0;
        background: #84aec6;
        color: #0d0202ae;
        font-family: "papyrus", sans-serif;
        display: flex;
        align-items: center;
        justify-content: center;
        height: 100vh;
        text-align: center;
        cursor: crosshair;
      }
      #hint {
        opacity: 0.7;
        font-size: 0.9rem;
      }
    </style>
  </head>
  <body>
    <div>
      <h1>Sound Drift</h1>
      <p id="hint">Click to begin · Move mouse to shape sound!</p>
      <div
        id="controls"
        style="
          margin-top: 16px;
          display: grid;
          gap: 10px;
          width: min(520px, 92vw);
        "
      >
        <div style="display: flex; gap: 10px; justify-content: center">
          <button id="startBtn">Start</button>
          <button id="stopBtn" disabled>Stop</button>
        </div>

        <label
          >Master <span id="masterVal">0.40</span>
          <input
            id="master"
            type="range"
            min="0"
            max="0.9"
            step="0.01"
            value="0.40"
          />
        </label>

        <label
          >Cutoff Range <span id="cutoffVal">3000</span> Hz
          <input
            id="cutoffRange"
            type="range"
            min="500"
            max="6000"
            step="10"
            value="3000"
          />
        </label>

        <label
          >Reverb <span id="wetVal">0.30</span>
          <input
            id="wet"
            type="range"
            min="0"
            max="1"
            step="0.01"
            value="0.30"
          />
        </label>

        <label
          >(LFO) <span id="lfoVal">0.08</span> Hz
          <input
            id="lfoRate"
            type="range"
            min="0"
            max="2"
            step="0.01"
            value="0.08"
          />
        </label>
      </div>
    </div>

    <script src="https://unpkg.com/tone@14.8.49/build/Tone.js"></script>
    <script src="script.js"></script>
  </body>
</html>
